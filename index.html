<!-- Centered Vapi Widget + Instructions Panel -->
<style>
  .vapi-page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f7f7fb;
  }

  .vapi-card {
    width: min(980px, 100%);
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 18px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .vapi-card {
      grid-template-columns: 1fr;
    }
  }

  .panel {
    background: white;
    border: 1px solid #e7e7ef;
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.06);
  }

  /* This is where we mount the widget */
  #vapi-widget-mount {
    min-height: 520px;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .instructions-label {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 10px;
  }

  .instructions {
    width: 100%;
    min-height: 520px;
    resize: vertical;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e7e7ef;
    outline: none;
    font-size: 14px;
    line-height: 1.4;
  }

  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
  }
</style>

<div class="vapi-page">
  <div class="vapi-card">
    <!-- Widget Column -->
    <div class="panel" id="vapi-widget-mount">
      <div>Loading assistant…</div>
    </div>

    <!-- Directions Column -->
    <div class="panel">
      <p class="instructions-label">Directions (edit this)</p>
      <textarea class="instructions" placeholder="Click on the call icon below to answer the call. Record your phone call and upload it to Canvas when done."></textarea>
    </div>
  </div>
</div>

<!-- Vapi Widget -->
<script
  src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
  defer
  async
></script>

<script>
  window.addEventListener("load", () => {
    window.vapiSDK.run({
      apiKey: "0ee2d047-2b55-4b08-8f67-dad8bce1595d",
      assistant: "4c1b07e4-8dd3-4dfd-a1ce-f2e451237ffb",
      config: {
        // Many sites use the default floating button.
        // We additionally provide a mount point so it appears centered in the page.
        mount: "#vapi-widget-mount",

        // Optional widget config:
        // mode: "voice", // or "chat"
        // theme: { primary: "#111827", secondary: "#ffffff" }
      }
    });
  });
</script>
