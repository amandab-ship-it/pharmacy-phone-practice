<!-- Vapi Widget -->
<script
  src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
  defer
  async>
</script>

<script>
window.addEventListener("load", () => {
  window.vapiSDK.run({
    apiKey: "0ee2d047-2b55-4b08-8f67-dad8bce1595d",
    assistant: "4c1b07e4-8dd3-4dfd-a1ce-f2e451237ffb"
  });

  // Wait for widget to be injected
  const interval = setInterval(() => {
    const btn = document.querySelector("#vapi-support-btn");

    if (btn) {
      clearInterval(interval);

      btn.style.position = "fixed";
      btn.style.top = "50%";
      btn.style.left = "50%";
      btn.style.bottom = "auto";
      btn.style.right = "auto";
      btn.style.transform = "translate(-50%, -50%)";
      btn.style.zIndex = "99999";
    }
  }, 100);
});
</script>
